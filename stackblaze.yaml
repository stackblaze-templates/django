databases:
  - name: django-db
    databaseName: django
    user: django
services:
  - type: web
    name: django
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn mysite.wsgi:application --bind 0.0.0.0:$PORT
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: django-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
